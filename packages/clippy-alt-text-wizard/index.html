<!doctype html>
<html lang="nl" dir="ltr" class="ma-theme clippy-theme utrecht-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alt-tekst keuzehulp - lokale test</title>
    <style>
      body {
        font-family: sans-serif;
        max-inline-size: 600px;
        margin-inline: auto;
        margin-block-start: 3rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="intro">
        <h2 class="nl-heading nl-heading--level-2">Kies de juiste alt-tekst</h2>
        <p class="nl-paragraph">Beantwoord een paar korte vragen over je afbeelding. Je krijgt direct advies over:</p>
        <ul class="utrecht-unordered-list">
          <li class="utrecht-unordered-list__item">Of alt-tekst nodig is.</li>
          <li class="utrecht-unordered-list__item">Wat je moet schrijven.</li>
        </ul>
        <p class="nl-paragraph">
          Zo zorg je ervoor dat iedereen je content kan begrijpen, ook met hulptechnologie zoals een schermlezer.
        </p>
        <button class="nl-button nl-button--primary" type="button" id="start-button">
          Start de alt-tekst keuzehulp
        </button>
      </div>

      <clippy-alt-text-wizard hidden id="wizard"></clippy-alt-text-wizard>
    </main>

    <script type="module" src="/src/main.ts"></script>
    <script>
      document.getElementById('start-button').addEventListener('click', () => {
        document.getElementById('intro').hidden = true;
        document.getElementById('wizard').hidden = false;
      });
    </script>
  </body>
</html>
