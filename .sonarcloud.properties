# Path to sources
#sonar.sources=.
#sonar.exclusions=
#sonar.inclusions=

# Path to tests
#sonar.tests=
#sonar.test.exclusions=
#sonar.test.inclusions=

# Source encoding
#sonar.sourceEncoding=UTF-8

# Exclusions for copy-paste detection
sonar.cpd.exclusions=**/index.html,**/*.test.ts,**/locales/*.ts

# Exclude rules for all index.html files (intentional test content)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6827
sonar.issue.ignore.multicriteria.e1.resourceKey=**/index.html
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.e2.resourceKey=**/index.html
